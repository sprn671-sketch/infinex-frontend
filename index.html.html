<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinex Performance Polymers - Product Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

  <header class="bg-gradient-to-r from-blue-900 to-cyan-800 text-white py-12 px-6 shadow-md">
    <div class="max-w-7xl mx-auto">
      <span class="text-cyan-400 font-semibold tracking-wider uppercase text-sm">Infinex Performance Polymers</span>
      <h1 class="text-4xl md:text-5xl font-bold mt-2">Advanced Material Catalog</h1>
      <p class="text-slate-200 mt-4 max-w-2xl text-lg">
        High-performance polymer compounds engineered for technical excellence, enhanced safety, and consistent quality across global industries.
      </p>
    </div>
  </header>

  <section class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-col md:flex-row gap-4 items-center justify-between border-b border-slate-200 pb-6">
      
      <div class="relative w-full md:w-96">
        <input type="text" id="searchInput" placeholder="Search compounds or properties (e.g., LSZH, TPE)..." 
               class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" />
        <span class="absolute left-3 top-2.5 text-slate-400">🔍</span>
      </div>

      <div class="flex flex-wrap gap-2 w-full md:w-auto" id="filterContainer">
        <span class="text-sm font-semibold text-slate-500 self-center mr-2">Filter by Industry:</span>
        <button data-filter="all" class="filter-btn bg-blue-900 text-white text-xs px-3 py-1.5 rounded-full font-medium shadow-sm transition">All</button>
        <button data-filter="Automotive & E-Mobility" class="filter-btn bg-white border border-slate-300 text-slate-600 text-xs px-3 py-1.5 rounded-full font-medium transition hover:border-blue-600 hover:text-blue-600">E-Mobility</button>
        <button data-filter="Building & Infrastructure" class="filter-btn bg-white border border-slate-300 text-slate-600 text-xs px-3 py-1.5 rounded-full font-medium transition hover:border-blue-600 hover:text-blue-600">Infrastructure</button>
        <button data-filter="Industrial & Manufacturing" class="filter-btn bg-white border border-slate-300 text-slate-600 text-xs px-3 py-1.5 rounded-full font-medium transition hover:border-blue-600 hover:text-blue-600">Industrial</button>
        <button data-filter="Data Centre’s & Smart Networks" class="filter-btn bg-white border border-slate-300 text-slate-600 text-xs px-3 py-1.5 rounded-full font-medium transition hover:border-blue-600 hover:text-blue-600">Data Centres</button>
      </div>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-6 pb-20">
    <div id="catalogGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      </div>
  </main>

  <script>
    // 1. Structured Product Database from Brochure Text
    const productsData = [
      {
        id: "hffr-lszh",
        name: "HFFR - LSZH Solutions",
        tagline: "Safer. Cleaner. Smarter Fire Protection.",
        category: "Cable Sheathing",
        description: "Developed for demanding wire and cable applications, our LSZH compounds offer an ideal balance of flame retardancy, mechanical strength, processability, and long-term reliability. Manufactured under stringent quality controls, these solutions help customers meet global safety standards while maintaining consistent production efficiency and product performance.",
        features: ["Low Smoke Generation", "Zero Halogen Formulation", "Reduced Toxic Emissions", "Superior Flame Retardancy"],
        industries: ["Building & Infrastructure", "Data Centre’s & Smart Networks", "Automotive & E-Mobility"]
      },
      {
        id: "tpu-compounds",
        name: "TPU Compounds",
        tagline: "Engineered for Tough Environments. Built for Lasting Performance.",
        category: "Tough Environments",
        description: "At Infinex, we tailor TPU formulations to meet specific application requirements, enabling manufacturers to achieve the right balance of hardness, flexibility, flame resistance, and processing efficiency. The result is a high-performance material solution that delivers durability, protection, and long-term value across a wide range of industrial applications.",
        features: ["Exceptional Abrasion Resistance", "Superior Mechanical Strength", "High Flexibility and Elasticity", "UV and Weather Resistance"],
        industries: ["Industrial & Manufacturing", "Automotive & E-Mobility"]
      },
      {
        id: "tpe-compounds",
        name: "TPE Compounds",
        tagline: "Flexibility, Reliability, and Performance in Perfect Balance",
        category: "Flexible Systems",
        description: "Developed for applications that require both mechanical resilience and processing efficiency, Infinex TPE solutions offer excellent resistance to heat, weathering, chemicals, and environmental stress. Their superior dielectric strength and flame-retardant characteristics make them suitable for a wide range of low-voltage and high-voltage cable systems.",
        features: ["Exceptional Flexibility", "Wide Temperature Resistance (-40°C to 120°C)", "High Dielectric Strength", "Flame-Retardant Performance"],
        industries: ["Automotive & E-Mobility", "Industrial & Manufacturing"]
      },
      {
        id: "hdpe-insulation",
        name: "HDPE Insulation Compounds",
        tagline: "Reliable Insulation for Modern Power and Communication Networks",
        category: "Insulation Material",
        description: "Infinex HDPE (High-Density Polyethylene) insulation compounds are engineered to deliver exceptional electrical performance, durability, and long-term reliability in demanding cable applications. Recognized for their excellent dielectric properties and low dielectric losses, HDPE compounds are widely used as insulation materials in power, telecommunication, and data transmission cables where consistent performance is critical.",
        features: ["Excellent Insulation Properties", "Low Dielectric Loss", "Superior Moisture Resistance", "Outstanding Environmental Stress Crack Resistance"],
        industries: ["Data Centre’s & Smart Networks", "Building & Infrastructure"]
      }
    ];

    // 2. State Management Variables
    let currentSearchTerm = "";
    let currentSelectedIndustry = "all";

    // 3. Render Catalog DOM Function
    function renderCatalog() {
      const catalogGrid = document.getElementById("catalogGrid");
      
      // Filter logic combining both text search AND button filter selections
      const filteredProducts = productsData.filter(product => {
        const matchesSearch = product.name.toLowerCase().includes(currentSearchTerm) || 
                              product.tagline.toLowerCase().includes(currentSearchTerm) ||
                              product.description.toLowerCase().includes(currentSearchTerm) ||
                              product.features.some(f => f.toLowerCase().includes(currentSearchTerm));
        
        const matchesIndustry = currentSelectedIndustry === "all" || 
                                product.industries.includes(currentSelectedIndustry);
        
        return matchesSearch && matchesIndustry;
      });

      // Handle blank empty states smoothly
      if (filteredProducts.length === 0) {
        catalogGrid.innerHTML = `
          <div class="col-span-full text-center py-12 bg-white rounded-xl border border-slate-200">
            <p class="text-slate-500 font-medium">No material grades match your active filters or search terms.</p>
            <button onclick="resetFilters()" class="mt-4 text-xs font-bold text-blue-900 underline">Reset All Filters</button>
          </div>`;
        return;
      }

      // Map matching array objects into direct raw HTML structures
      catalogGrid.innerHTML = filteredProducts.map(product => `
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition duration-300 flex flex-col justify-between">
          <div class="p-6 md:p-8">
            <div class="flex justify-between items-start gap-4">
              <div>
                <h2 class="text-2xl font-bold text-blue-900">${product.name}</h2>
                <p class="text-cyan-700 font-medium text-sm mt-1 italic">${product.tagline}</p>
              </div>
              <span class="bg-blue-50 text-blue-900 text-xs px-2.5 py-1 rounded font-semibold border border-blue-100 uppercase whitespace-nowrap">${product.category}</span>
            </div>
            
            <p class="text-slate-600 text-sm mt-4 leading-relaxed">${product.description}</p>

            <div class="mt-6">
              <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Key Technical Advantages</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                ${product.features.map(feat => `
                  <div class="flex items-center text-xs text-slate-700">
                    <span class="text-cyan-600 mr-2">✔</span> ${feat}
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="bg-slate-50 px-6 py-4 border-t border-slate-100 flex items-center justify-between">
            <span class="text-xs text-slate-500 font-medium">Compliance: ISO / RoHS / REACH</span>
            <a href="mailto:sales@infinexpolymers.com?subject=TDS Inquiry: ${encodeURIComponent(product.name)}" 
               class="bg-blue-900 hover:bg-cyan-800 text-white font-medium text-xs px-4 py-2 rounded transition shadow-sm block text-center">
              Inquire for TDS
            </a>
          </div>
        </div>
      `).join('');
    }

    // 4. Live Typing Event Listeners
    document.getElementById("searchInput").addEventListener("input", (e) => {
      currentSearchTerm = e.target.value.toLowerCase();
      renderCatalog();
    });

    // 5. Button Category Active / Inactive States Handler
    document.getElementById("filterContainer").addEventListener("click", (e) => {
      const clickedBtn = e.target.closest(".filter-btn");
      if (!clickedBtn) return;

      // Reset styles across all custom buttons
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.className = "filter-btn bg-white border border-slate-300 text-slate-600 text-xs px-3 py-1.5 rounded-full font-medium transition hover:border-blue-600 hover:text-blue-600";
      });

      // Activate highlight classes on the selected category button
      clickedBtn.className = "filter-btn bg-blue-900 text-white text-xs px-3 py-1.5 rounded-full font-medium shadow-sm transition";
      
      currentSelectedIndustry = clickedBtn.getAttribute("data-filter");
      renderCatalog();
    });

    // Helper: Reset Everything
    function resetFilters() {
      document.getElementById("searchInput").value = "";
      currentSearchTerm = "";
      currentSelectedIndustry = "all";
      document.querySelector('[data-filter="all"]').click();
    }

    // Primary Execution Call on document open
    renderCatalog();
  </script>
</body>
</html>
